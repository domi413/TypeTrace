[project]
name = "typetrace"
version = "0.1.0" # TODO: Set this to release version

# TODO: Add needed dependency versions e.g. "appdirs>=1.4.4",
requires-python = ">=3.8"
dependencies = [
    "appdirs",
    "dbus-python",
    "evdev",
]

[project.optional-dependencies]
dev = [
    "pygobject<3.52.0",
    "ruff",
    "pytest",
    "pytest-mock",
]

[tool.setuptools]
packages = [
    "typetrace",
    "tests"
]

[tool.ruff]
extend-select = [
    "ALL",
]
ignore = [
    "ANN401",  # Ignore `Any` type annotation for functions
    "ANN003",  # Ignore missing type annotation for **kwargs
    "D203",    # In conflict with D211
    "D213",    # In conflict with D212
    "ANN101",  # Ignore missing type annotation for `self` (should never be annotated in Python)
    "A003",    # Allow method/attribute names that shadow built-ins (e.g., `quit`) 
    "FBT003",  # Allow using plain `flag=False` instead of `flag: bool = False` (boilerplate reduction)
    "PLR0913", # Ignore warnings for too many function arguments (common in D-Bus or GTK callbacks)
    "ANN102",  # Ignore missing type annotation for `cls` (same reasoning as `self`)
]

[tool.ruff.per-file-ignores]
"tests/*" = [
    "SLF001",  # Allow access to private member
    "PLR2004", # Ignore magic values
    "S101",    # Ignore asserts
]
