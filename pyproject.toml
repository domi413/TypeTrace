[project]
name = "typetrace"
version = "0.1.0" # TODO: Set this to the release version

# TODO: Add required dependency versions, e.g. "appdirs>=1.4.4"
requires-python = ">=3.8"
dependencies = [
    "appdirs",
    "dbus-python",
    "evdev",
]

[project.optional-dependencies]
dev = [
    "ruff",
   
]

[tool.ruff.lint]
extend-select = [
    "ALL",
]
ignore = [
    "ANN003", # Ignore missing type annotation for **kwargs
    "ANN401", # Ignore use of `Any` type annotation in functions
    "D203",   # Conflicts with D211
    "D213",   # Conflicts with D212
]
