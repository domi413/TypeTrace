[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "typetrace"
version = "0.1.0" # TODO: Set this to the release version

# TODO: Add required dependency versions, e.g. "appdirs>=1.4.4"
requires-python = ">=3.8"
dependencies = [
    "appdirs",
    "evdev",
]

[project.optional-dependencies]
dev = [
    "ruff",
]

[tool.setuptools]
packages = ["typetrace"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN101", "SLF001", "D103"]

