[project]
name = "typetrace"
version = "0.1.0" # TODO: Set this to release version

# TODO: Add needed dependency versions e.g. "appdirs>=1.4.4",
requires-python = ">=3.8" 
dependencies = [
    "appdirs",
    "dbus-python",
    "evdev",
]

[project.optional-dependencies]
dev = [
    "ruff",
]

[tool.ruff.lint]
select = [
    "E",  # pycodestyle
    "F",  # pyflakes
    "ANN",  # type annotations
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "I",      # isort
    "PT",     # pytest-style 
]

ignore = [
    "ANN001", # Ignore missing type annotation for function arguments
    "ANN002", # Ignore missing type annotation for *args
    "ANN003", # Ignore missing type annotation for **kwargs
    "D203",   # In conflict with D211
    "D213",   # In conflict with D212
    
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["ANN","PT009","E402", "SLF001"]

