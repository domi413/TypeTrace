name: Auto Update PRs
on:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  autoupdate:
    runs-on: ubuntu-22.04
    steps:
      - uses: chinthakagodawita/autoupdate-action@v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          MERGE_CONFLICT_ACTION: fail
          PR_FILTER: all
          MERGE_MSG: "Auto-updated PR with latest changes from main"
