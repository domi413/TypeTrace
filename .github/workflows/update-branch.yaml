name: Update out-of-date PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  merge_main_into_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Fetch base branch
        run: git fetch origin ${{ github.event.pull_request.base.ref }}

      - name: Attempt merge main into PR branch
        id: merge
        run: |
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"

          echo "Attempting to merge '${BASE_BRANCH}' into '${HEAD_BRANCH}'"

          if merge_output=$(git merge origin/${BASE_BRANCH} --no-commit --no-ff 2>&1); then
            if [[ -n "$(git status --porcelain)" ]]; then
              echo "Merge was clean and introduced changes."
              git commit -m "Merge branch 'main' into ${HEAD_BRANCH}"
              echo "merge_successful=true" >> $GITHUB_OUTPUT
              echo "changes_committed=true" >> $GITHUB_OUTPUT
            else
              echo "Merge was clean but no changes were introduced (already up-to-date)."
              echo "merge_successful=true" >> $GITHUB_OUTPUT
              echo "changes_committed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Merge resulted in conflicts."
            echo "${merge_output}"
            git merge --abort
            echo "merge_successful=false" >> $GITHUB_OUTPUT
            echo "changes_committed=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Push changes
        if: steps.merge.outputs.merge_successful == 'true' && steps.merge.outputs.changes_committed == 'true'
        run: |
          HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Pushing merged changes to ${HEAD_BRANCH}"
          git push origin ${HEAD_BRANCH}

      - name: Notify on merge conflict
        if: steps.merge.outputs.merge_successful == 'false'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Merge conflicts detected when updating PR #${PR_NUMBER} with main."
          echo "Please resolve conflicts manually."
