name: Auto Update PR Branch

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  update-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: lcdsmao/update-branch@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          autoMergeMethod: MERGE
          requiredApprovals: 0
          fetchMaxPr: 50
          fetchMaxPrChecks: 100
          fetchMaxPrLabels: 10
          fetchMaxComments: 50
          prChecksFetchOrder: first
          disableAutoMerge: true
