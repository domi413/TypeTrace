name: 'Build Windows Executables'
description: 'Build TypeTrace with PyInstaller'

inputs:
  entry_point:
    description: 'Main Python script path'
    required: true
  app_name:
    description: 'Application name'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Run PyInstaller
      shell: pwsh
      run: |
        $env:PATH += ";C:\gtk\bin"
        pyinstaller ${{ inputs.entry_point }} `
          --name=${{ inputs.app_name }} `
          --onefile `
          --noconsole `
          --add-data="C:\gtk\bin\*.dll;." `
          --hidden-import=gi
        
        # Optional: Compress with UPX
        choco install upx -y
        upx --best dist/${{ inputs.app_name }}.exe