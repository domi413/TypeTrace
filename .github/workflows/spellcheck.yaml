name: Spellcheck

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    name: Checks the documents for spelling

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed_files
        uses: tj-actions/changed-files@v46
        with:
          separator: " "

      - name: Starting cspell on changed files
        if: steps.changed_files.outputs.all_changed_files != ''
        uses: streetsidesoftware/cspell-action@v6
        with:
          files: ${{ steps.changed_files.outputs.all_changed_files }}
          root: "."
          check_dot_files: false
          inline: error
          treat_flagged_words_as_errors: false
          suggestions: true
          strict: true
          config: ".github/spellcheck/cspell.json"
          incremental_files_only: false
          verbose: true
          use_cspell_files: false
