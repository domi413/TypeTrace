name: Windows Build

on: [ push, pull_request ]

env:
  gvsbuild_version: 2025.2.0

jobs:
  windows_build:
    runs-on: windows-latest
    steps:
      - name: Cache GTK
        uses: actions/cache@v4
        with:
          path: C:\gtk\**
          key: ${{ runner.os }}-gvsbuild-${{ env.gvsbuild_version }}

      - name: Download GTK
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          Invoke-WebRequest "https://github.com/wingtk/gvsbuild/releases/download/$env:gvsbuild_version/GTK4_Gvsbuild_$env:gvsbuild_version_x64.zip" -OutFile gtk.zip
          Expand-Archive gtk.zip -DestinationPath C:\gtk

      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install

      - name: Build executables
        uses: ./.github/actions/windows_executables
        with:
          entry_point: "_install/bin/typetrace"
          app_name: "TypeTrace"