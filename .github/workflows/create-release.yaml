name: Generate Release Notes

on:
  push:
    branches:
      - main
    tags:
      - "R*" # Trigger on tags such as R4

jobs:
  update_release_draft:
    name: Update Release Draft
    if: github.ref_type == 'branch' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Run Release Drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: .github/release-drafter.yaml
          publish: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release:
    name: Publish Release
    needs: update_release_draft
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'R')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Flatpak and Flatpak-builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder make

      - name: Extract Tag Number for Release Name
        id: extract_tag
        run: |
          TAG_NAME=${{ github.ref_name }}
          TAG_NUMBER=${TAG_NAME#R}
          echo "tag_number=$TAG_NUMBER" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build and Export Flatpak
        id: build_flatpak
        run: |
          make flatpak-export 
          echo "flatpak_file=typetrace.flatpak" >> $GITHUB_OUTPUT
        shell: bash

      - name: Publish Release with Release Drafter
        id: publish_release_step
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yaml
          publish: true
          tag: ${{ github.ref_name }}
          name: Review ${{ steps.extract_tag.outputs.tag_number }}
          files: |
            ${{ steps.build_flatpak.outputs.flatpak_file }}
          prerelease: false
          latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
