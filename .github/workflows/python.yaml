name: Check Python Code

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened

jobs:
  lint:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install additional dependencies for dbus-python
        run: |
            sudo apt-get update
            sudo apt-get install -y build-essential clang libdbus-1-dev libgirepository1.0-dev pkg-config python3-dev cmake
            pkg-config --modversion dbus-1  # Debugging step to verify dbus-1 installation

      - name: Install dependencies with uv
        run: uv sync --extra dev

      - name: Run ruff
        run: uv run ruff check --fix

  test:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install additional dependencies for dbus-python
        run: |
            sudo apt-get update
            sudo apt-get install -y build-essential libdbus-1-dev libgirepository1.0-dev pkg-config python3-dev cmake
            pkg-config --modversion dbus-1  # Debugging step to verify dbus-1 installation

      - name: Install dependencies with uv
        run: uv sync --extra dev

      - name: Run unittest
        run: python3 -m unittest discover -s tests -p "test_*.py" -v
