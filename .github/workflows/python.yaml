name: Check Python Code

on:
pull_request:
  types:
    - opened
    - synchronize
    - ready_for_review
    - reopened

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check src/
