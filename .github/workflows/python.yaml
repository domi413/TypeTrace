name: Check Python Code

on: [pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.x"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check typetrace/

      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy typetrace/backend/
