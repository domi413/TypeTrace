name: Check Python Code

on:
    pull_request:
        types:
            - opened
            - synchronize
            - ready_for_review
            - reopened

jobs:
    check-python:
        runs-on: ubuntu-latest

        if: ${{ !github.event.pull_request.draft }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up uv and Python
              uses: astral-sh/setup-uv@v6
              with:
                  python-version: "3.13"
                  enable-cache: true
                  cache-dependency-glob: "**/pyproject.toml"

            - name: Cache APT packages
              id: cache-apt
              uses: actions/cache@v4
              with:
                  path: apt-cache
                  key: ${{ runner.os }}-apt

            - name: Install dbus
              run: |
                  sudo apt-get update
                  sudo apt-get -o dir::cache::archives=apt-cache install -y libgirepository-2.0-0 libgirepository1.0-dev

            - name: Create virtual environment
              run: uv venv

            - name: Install project dependencies (including dev)
              run: uv pip install -e .[dev]

            - name: Run ruff
              run: uv run ruff check

            - name: Run tests
              run: uv run pytest
