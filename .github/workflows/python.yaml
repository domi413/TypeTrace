name: Check Python Code

on:
  pull_request:
    types:
      - opened
      - synchronize
      - ready_for_review
      - reopened

jobs:
  check-python:
    runs-on: ubuntu-latest

    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock

      - name: Cache APT packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: apt-cache
          key: ${{ runner.os }}-apt-${{ hashFiles('**/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies
        run: |
          # Color definitions
          RED='\033[1;91m'
          GREEN='\033[1;92m'
          YELLOW='\033[1;93m'
          CYAN='\033[1;96m'
          NC='\033[0m'

          mkdir -p apt-cache

          if [[ "${{ steps.cache-apt.outputs.cache-hit }}" == "true" ]]; then
           echo -e "${GREEN}APT package cache hit! Using cached packages.${NC}"
          else
           echo -e "${YELLOW}APT package cache miss. Downloading packages...${NC}"
          fi

          echo -e "${CYAN}Updating package lists...${NC}"
          sudo apt-get update

          echo -e "${CYAN}Installing required system dependencies...${NC}"
          sudo apt-get -o dir::cache::archives=apt-cache install -y libdbus-1-dev libgirepository-2.0-0 libgirepository1.0-dev libcairo2-dev

          echo -e "${GREEN}System dependencies installed successfully.${NC}"

      - name: Create virtual environment
        run: uv venv

      - name: Install project dependencies (including dev)
        run: uv pip install -e .[dev]

      - name: Run ruff
        run: uv run ruff check

      - name: Run tests
        run: uv run pytest
